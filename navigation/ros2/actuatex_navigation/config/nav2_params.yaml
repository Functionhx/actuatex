# ActuateX TinyMal navigation parameters for ROS 2 Humble / Nav2 1.1.
# The controller and command envelope match the trained omnidirectional policy.

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.15
    alpha2: 0.15
    alpha3: 0.20
    alpha4: 0.20
    alpha5: 0.10
    base_frame_id: base_link
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: scan
    robot_model_type: nav2_amcl::OmniMotionModel
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_max_range: 8.0
    laser_min_range: 0.08
    max_beams: 120
    min_particles: 400
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    save_pose_rate: 0.5
    sigma_hit: 0.20
    tf_broadcast: true
    transform_tolerance: 0.30
    update_min_a: 0.10
    update_min_d: 0.08
    z_hit: 0.70
    z_max: 0.05
    z_rand: 0.25
    z_short: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 0.5
    odom_topic: /odom
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.20
      movement_time_allowance: 12.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 50
      model_dt: 0.05
      batch_size: 1200
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.20
      temperature: 0.30
      gamma: 0.015
      vx_std: 0.15
      vy_std: 0.10
      wz_std: 0.25
      vx_max: 0.55
      vx_min: -0.25
      vy_max: 0.25
      wz_max: 0.75
      ax_max: 0.80
      ax_min: -0.80
      ay_max: 0.60
      ay_min: -0.60
      az_max: 1.20
      motion_model: Omni
      visualize: false
      regenerate_noises: false
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - TwirlingCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.2
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.07
        offset_from_furthest: 16
        threshold_to_consider: 0.5
        trajectory_point_step: 4
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.2
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      # Humble declares these two costmap dimensions as integer parameters.
      width: 4
      height: 4
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      footprint: "[[-0.28, -0.20], [-0.28, 0.20], [0.28, 0.20], [0.28, -0.20]]"
      footprint_padding: 0.03
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 7.5
          raytrace_min_range: 0.08
          raytrace_max_range: 8.0
          max_obstacle_height: 1.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.48
        cost_scaling_factor: 4.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      update_frequency: 2.0
      publish_frequency: 1.0
      track_unknown_space: true
      footprint: "[[-0.28, -0.20], [-0.28, 0.20], [0.28, 0.20], [0.28, -0.20]]"
      footprint_padding: 0.03
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 7.5
          raytrace_min_range: 0.08
          raytrace_max_range: 8.0
          max_obstacle_height: 1.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.48
        cost_scaling_factor: 4.0
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.20
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: [simple_smoother]
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.20
    cycle_frequency: 10.0
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.60
    min_rotational_vel: 0.15
    rotational_acc_lim: 1.20
    behavior_plugins: [spin, backup, drive_on_heading, assisted_teleop, wait]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    wait:
      plugin: nav2_behaviors/Wait

robot_state_publisher:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: true
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 1000

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 50.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.55, 0.25, 0.75]
    min_velocity: [-0.25, -0.25, -0.75]
    max_accel: [0.80, 0.60, 1.20]
    max_decel: [-1.00, -0.80, -1.50]
    odom_topic: /odom
    odom_duration: 0.10
    deadband_velocity: [0.02, 0.02, 0.04]
    velocity_timeout: 0.30

cmd_vel_adapter:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /actuatex/policy_cmd
    publish_rate_hz: 50.0
    command_timeout_s: 0.30
    max_forward: 0.55
    max_reverse: 0.25
    max_lateral: 0.25
    max_yaw: 0.75
    acceleration_x: 0.80
    acceleration_y: 0.60
    acceleration_yaw: 1.20
    deadband_x: 0.02
    deadband_y: 0.02
    deadband_yaw: 0.04
