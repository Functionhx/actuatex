    <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#93b6c9" letter-spacing="1.5">
      <path d="M136 83l75 48" stroke="#44d7ff" stroke-opacity="0.45"/>
      <circle cx="136" cy="83" r="4" fill="#44d7ff"/>
