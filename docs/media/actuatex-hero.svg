<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="520" viewBox="0 0 1440 520" role="img" aria-labelledby="title desc">
  <title id="title">ActuateX — Learn. Act. Control.</title>
  <desc id="desc">A dark technical banner showing a stylized quadruped and the MuJoCo, Isaac Gym, and Isaac Lab simulation backends.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101d"/>
      <stop offset="0.55" stop-color="#0a1a2d"/>
      <stop offset="1" stop-color="#101c30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#44d7ff"/>
      <stop offset="0.5" stop-color="#71f6d1"/>
      <stop offset="1" stop-color="#ffb45b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#143b59"/>
      <stop offset="1" stop-color="#0d263d"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0" stop-color="#36d6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#36d6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8ec7e8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1440" height="520" rx="28" fill="url(#bg)"/>
  <rect width="1440" height="520" rx="28" fill="url(#grid)"/>
  <circle cx="1120" cy="250" r="310" fill="url(#halo)"/>
  <path d="M0 454C290 412 470 498 736 453s461-18 704-73v140H0Z" fill="#06101c" fill-opacity="0.74"/>
  <path d="M0 454C290 412 470 498 736 453s461-18 704-73" fill="none" stroke="#65e8d6" stroke-opacity="0.22" stroke-width="2"/>

  <g transform="translate(88 72)">
    <g transform="translate(0 1)">
      <path d="M0 0H46L65 19 46 38H0L19 19Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
      <circle cx="32" cy="19" r="7" fill="#66edd7" filter="url(#glow)"/>
    </g>
    <text x="82" y="30" fill="#e7f7ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="27" font-weight="750" letter-spacing="5">ACTUATEX</text>
    <text x="0" y="102" fill="#f5fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="64" font-weight="760" letter-spacing="-1">Learn. Act. Control.</text>
    <rect x="0" y="126" width="430" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="0" y="174" fill="#a8c4d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23">A hands-on classroom for robust robot learning</text>
    <text x="0" y="210" fill="#7899b2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">ONE ROBOT  ·  THREE PHYSICS ENGINES  ·  REPRODUCIBLE EVIDENCE</text>

    <g transform="translate(0 258)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="650">
      <rect width="142" height="45" rx="22.5" fill="#102b40" stroke="#44d7ff" stroke-opacity="0.55"/>
      <circle cx="25" cy="22.5" r="5" fill="#44d7ff"/>
      <text x="42" y="29" fill="#dff8ff">MuJoCo</text>
      <g transform="translate(157)">
        <rect width="157" height="45" rx="22.5" fill="#102b40" stroke="#71f6d1" stroke-opacity="0.55"/>
        <circle cx="25" cy="22.5" r="5" fill="#71f6d1"/>
        <text x="42" y="29" fill="#e4fff8">Isaac Gym</text>
      </g>
      <g transform="translate(329)">
        <rect width="198" height="45" rx="22.5" fill="#102b40" stroke="#ffb45b" stroke-opacity="0.62"/>
        <circle cx="25" cy="22.5" r="5" fill="#ffb45b"/>
        <text x="42" y="29" fill="#fff1de">Isaac Lab + Sim</text>
      </g>
    </g>
  </g>

