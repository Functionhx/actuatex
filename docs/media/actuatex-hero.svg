      <path d="M488 84l-69 36" stroke="#ffb45b" stroke-opacity="0.48"/>
      <circle cx="488" cy="84" r="4" fill="#ffb45b"/>
      <text x="500" y="89">PHYSICS</text>
      <path d="M506 221l-65 0" stroke="#71f6d1" stroke-opacity="0.45"/>
