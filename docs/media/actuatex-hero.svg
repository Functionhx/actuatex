      <path d="M359 122l44-17 40 23-44 46" fill="#102f48" stroke="#b9f4ff" stroke-width="3"/>
      <circle cx="418" cy="126" r="6" fill="#ffb45b" filter="url(#glow)"/>
      <path d="M219 184l-32 61 31 61-13 43" fill="none" stroke="#d3f8ff" stroke-width="9"/>
      <path d="M270 185l16 58-32 63 10 43" fill="none" stroke="#d3f8ff" stroke-width="9"/>
